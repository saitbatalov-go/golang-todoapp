services:
  todoapp-postgres:
    image: postgres:17-alpine  # ← Только это меняем
    container_name: todoapp-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # Удаляем PGDATA - для 17 не нужна
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql/data  # ← Возвращаем /data
    restart: unless-stopped

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    depends_on:
      - todoapp-postgres

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    depends_on:
      - todoapp-postgres